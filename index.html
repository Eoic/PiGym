<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> PiGym </title>
  </head>
  <body>
    <header>
      <div class="brand-icon">
        PiGym
      </div>
  </header>
  <main x-data>
      <nav>
          <ul>
              <template x-for="route in $store.routes.items">
                <li><a x-text="route" :href="`/${route}`" :class="$router.route === `/${route}` && 'active'"></a></li>
              </template>
          </ul>
      </nav>

      <div class="content">
        <template x-route="/" x-handler="[(context) => context.redirect('/challenge')]"></template>

        <template x-route="/challenge">
          <p> Challenge page. </p>
        </template>

        <template x-route="/practice">
          <p> Practice page. </p>
        </template>

        <template x-route="notfound">
          <p> Page not found. </p>
        </template>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
